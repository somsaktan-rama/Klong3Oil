<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <title>ตรวจสอบบิลส่งกะ คลอง 3 V.1.09</title>
  <style>
    body { font-family: Tahoma, sans-serif; margin: 20px; }
    select, button { padding: 8px; font-size: 16px; margin-bottom: 15px; }
    .container { display: flex; gap: 20px; flex-wrap: wrap; }
    .img-box { flex: 1; min-width: 300px; border: 1px solid #ccc; height: 70vh;}
    .data-box { flex: 1; min-width: 300px; }
    iframe { width: 100%; height: 100%; border: none; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #f4f4f4; }
  </style>
</head>
<body>
  <h2>🔎 ตรวจสอบและแก้ไขบิล</h2>

  <select id="shiftSelector" onchange="loadData()">
    <option value="">⏳ กำลังโหลดรายการบิล...</option>
  </select>

  <div class="container">
    <div class="img-box">
      <div id="noImg" style="padding: 20px; text-align: center; color: #888;">(ไม่มีรูปภาพบิล)</div>
      <iframe id="billFrame" style="display:none;"></iframe>
    </div>

    <div class="data-box">
      <table>
        <tbody id="tableBody">
          <tr><td colspan="2" style="text-align:center;">กรุณาเลือกบิลด้านบน 👆</td></tr>
        </tbody>
      </table>
      <button id="btnSave" style="margin-top: 15px; display: none;" disabled>💾 บันทึกการแก้ไข (กำลังพัฒนา)</button>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxnCwbzrlgc6RDOVJE2dKIfO70AZye0F1TUCUPAGSxRH1WkfaVMHjACUjUl2HQfCN0/exec"; 

    // 1. โหลดรายการ Dropdown
    window.onload = async () => {
      try {
        const res = await (await fetch(API_URL + "?action=getShiftList")).json();
        const sel = document.getElementById('shiftSelector');
        sel.innerHTML = '<option value="">-- เลือกรายการบิลที่ต้องการตรวจสอบ --</option>';
        if(res.status === "success") {
          res.data.forEach(item => sel.add(new Option(item.label, item.id)));
        }
      } catch (err) {
        document.getElementById('shiftSelector').innerHTML = '<option value="">❌ โหลดรายการไม่สำเร็จ</option>';
      }
    };

    // 2. โหลดข้อมูล 1 แถวแบบป้องกันหน้าค้าง (Try-Catch)
    async function loadData() {
      const id = document.getElementById('shiftSelector').value;
      const tableBody = document.getElementById('tableBody');
      const frame = document.getElementById('billFrame');
      const noImg = document.getElementById('noImg');
      
      if(!id) { 
        tableBody.innerHTML = '<tr><td colspan="2" style="text-align:center;">กรุณาเลือกบิลด้านบน 👆</td></tr>';
        frame.style.display = 'none'; noImg.style.display = 'block';
        return; 
      }
      
      tableBody.innerHTML = '<tr><td colspan="2" style="text-align: center; color: blue;">⏳ กำลังโหลดข้อมูล...</td></tr>';

      try {
        const response = await fetch(API_URL + `?action=getVerificationData&rowId=${id}`);
        const res = await response.json();
        
        if(res.status === "success") {
          const d = res.data;
          
          // โชว์รูป
          const match = d.imageUrl ? d.imageUrl.match(/[-\w]{25,}/) : null;
          if(match) { 
            frame.src = `https://drive.google.com/file/d/${match[0]}/preview`; 
            frame.style.display = 'block'; noImg.style.display = 'none'; 
          } else { 
            frame.style.display = 'none'; noImg.style.display = 'block'; 
          }

          // เรนเดอร์ข้อมูลลงตารางเบื้องต้น
          tableBody.innerHTML = `
            <tr><th>วันที่</th><td>${d.date}</td></tr>
            <tr><th>เวลา</th><td>${d.time}</td></tr>
            <tr><th>กะ</th><td>${d.shift}</td></tr>
            <tr><th>ปริมาณรวม (ตัวอย่าง)</th><td>${d.volumes.filter(v => v !== "").length} รายการ</td></tr>
          `;
          document.getElementById('btnSave').style.display = 'block';
        } else {
          throw new Error(res.message);
        }
      } catch (error) {
        tableBody.innerHTML = `<tr><td colspan="2" style="text-align: center; color: red;">❌ เกิดข้อผิดพลาด: ${error.message}</td></tr>`;
      }
    }
  </script>
</body>
</html>
