<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ตรวจสอบบิลส่งกะ คลอง 3 V.1.06</title>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 15px; background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
    .header-bar { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
    .main-container { display: flex; gap: 15px; flex: 1; overflow: hidden; }
    .image-panel { flex: 4; background: white; border-radius: 8px; display: flex; flex-direction: column; align-items: center; padding: 10px;}
    .image-panel iframe { width: 100%; height: 100%; border: none; }
    .data-panel { flex: 6; background: white; border-radius: 8px; padding: 15px; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    th { background: #1a73e8; color: white; position: sticky; top: 0; }
    input[type="number"] { width: 140px; padding: 8px; font-size: 1.3em; font-weight: bold; text-align: right; border: 2px solid #1a73e8; border-radius: 4px; }
    input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .summary-box { background: #e8f0fe; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="header-bar">
    <a href="index.html" style="text-decoration:none; font-weight:bold; color:#555;">🏠 กลับ</a>
    <select id="shiftSelector" onchange="loadData()" style="padding:10px; width:300px;"><option value="">-- โหลดรายการ --</option></select>
    <button onclick="saveData()" id="btnSave" style="padding:10px 20px; background:#28a745; color:white; border:none; border-radius:4px; font-weight:bold;" disabled>💾 บันทึก</button>
  </div>

  <div class="main-container">
    <div class="image-panel">
      <iframe id="billFrame" style="display:none;"></iframe>
      <div id="noImg">โปรดเลือกกะ</div>
    </div>
    <div class="data-panel">
      <div class="summary-box">
        <b>📊 ยอดเงินกะนี้</b>
        <table style="margin-top:10px; background:white;">
          <thead><tr><th>ชนิด</th><th>ปริมาณ</th><th>ราคา</th><th>รวม (บาท)</th></tr></thead>
          <tbody id="sumBody"></tbody>
          <tfoot><tr><th colspan="3">รวมทั้งสิ้น:</th><th id="grandTotal" style="color:green;">0.00</th></tr></tfoot>
        </table>
      </div>
      <table id="mainTable">
        <thead><tr><th>ลำดับ</th><th>รายการ</th><th>กะก่อน</th><th>กะนี้ (แก้ไข)</th><th>ผลต่าง</th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxnCwbzrlgc6RDOVJE2dKIfO70AZye0F1TUCUPAGSxRH1WkfaVMHjACUjUl2HQfCN0/exec";
    let current = null;

    window.onload = async () => {
      const res = await (await fetch(API_URL + "?action=getShiftList")).json();
      const sel = document.getElementById('shiftSelector');
      sel.innerHTML = '<option value="">-- เลือกกะตรวจสอบ --</option>';
      res.data.forEach(i => sel.innerHTML += `<option value="${i.rowId}">${i.display}</option>`);
    };

    async function loadData() {
      const id = document.getElementById('shiftSelector').value;
      if(!id) return;
      document.getElementById('tableBody').innerHTML = '<tr><td colspan="5">กำลังโหลด...</td></tr>';
      const res = await (await fetch(API_URL + `?action=getVerificationData&rowId=${id}`)).json();
      current = res.data;
      render();
      const frame = document.getElementById('billFrame');
      const match = current.imageUrl.match(/[-\w]{25,}/);
      if(match) { frame.src = `https://drive.google.com/file/d/${match[0]}/preview`; frame.style.display='block'; document.getElementById('noImg').style.display='none'; }
      document.getElementById('btnSave').disabled = false;
    }

    function render() {
      const body = document.getElementById('tableBody');
      body.innerHTML = '';
      for(let i=0; i<36; i++){
        let p = parseFloat(current.prevData[i])||0;
        let c = current.currData[i] !== "" ? parseFloat(current.currData[i]) : 0;
        body.innerHTML += `<tr><td>${current.headers.h1[i]}</td><td>${current.headers.h2[i]}<br><small>${current.headers.h3[i]}</small></td><td>${p.toLocaleString()}</td><td><input type="number" step="any" inputmode="decimal" id="curr_${i}" value="${c}" oninput="calc()"></td><td id="diff_${i}">0</td></tr>`;
      }
      const unique = [...new Set(current.headers.h3.filter(g => g !== "-" && g !== ""))];
      document.getElementById('sumBody').innerHTML = unique.map((g, i) => `<tr><td>${g}</td><td id="sv_${i}">0</td><td><input type="number" step="any" inputmode="decimal" style="width:80px; font-size:1em;" id="sp_${i}" data-group="${g}" value="${current.prices[g]||0}" oninput="calc()"></td><td id="sa_${i}">0</td></tr>`).join('');
      calc();
    }

    function calc() {
      let gTot = {}, grand = 0;
      for(let i=0; i<36; i++){
        let d = Math.max(0, (parseFloat(document.getElementById('curr_'+i).value)||0) - (parseFloat(current.prevData[i])||0));
        document.getElementById('diff_'+i).innerText = d.toLocaleString(undefined,{minimumFractionDigits:3});
        let g = current.headers.h3[i];
        if(g!=="-" && g!=="") gTot[g] = (gTot[g]||0) + d;
      }
      document.querySelectorAll('.summary-box input').forEach((inp, i) => {
        let v = gTot[inp.dataset.group]||0, p = parseFloat(inp.value)||0, a = v*p;
        document.getElementById('sv_'+i).innerText = v.toLocaleString(undefined,{minimumFractionDigits:3});
        document.getElementById('sa_'+i).innerText = a.toLocaleString(undefined,{minimumFractionDigits:2});
        grand += a;
      });
      document.getElementById('grandTotal').innerText = grand.toLocaleString(undefined,{minimumFractionDigits:2});
    }

    async function saveData() {
      const btn = document.getElementById('btnSave');
      btn.disabled = true; btn.innerText = '⏳ บันทึก...';
      let vs = [], ps = {};
      for(let i=0; i<36; i++) vs.push(document.getElementById('curr_'+i).value === "" ? "" : parseFloat(document.getElementById('curr_'+i).value));
      document.querySelectorAll('.summary-box input').forEach(i => ps[i.dataset.group] = parseFloat(i.value)||0);
      await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "saveEditedData", rowId: document.getElementById('shiftSelector').value, volumes: vs, prices: ps }) });
      alert("✅ บันทึกสำเร็จ"); btn.disabled = false; btn.innerText = '💾 บันทึก';
    }
  </script>
</body>
</html>
