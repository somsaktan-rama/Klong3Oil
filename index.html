<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>อัปโหลดบิลส่งกะ คลอง 3 V1.08</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.js"></script>
  <style>
    body { font-family: Tahoma, sans-serif; margin: 20px; }
    .price-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; margin-bottom: 20px;}
    .price-item { display: flex; flex-direction: column; }
    input { padding: 5px; border-radius: 4px; border: 1px solid #ccc; }
    button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top:10px; }
    button:disabled { background: #ccc; }
    #cropArea { max-width: 100%; height: 60vh; margin-top: 10px; display: none; }
    #status { margin-top: 15px; font-weight: bold; }
  </style>
</head>
<body>
  <h2>⛽ บันทึกบิลน้ำมัน (OCR)</h2>
  
  <div id="priceContainer">กำลังโหลดราคาน้ำมัน...</div>

  <div style="margin-top: 20px;">
    <b>อัปโหลดบิลน้ำมัน:</b><br>
    <input type="file" id="fileInput" accept="image/*" style="margin-top: 5px;">
  </div>
  
  <div id="overwriteContainer" style="display:none; margin-top:15px;">
    <label><input type="checkbox" id="overwriteCheck"> ⚠️ บันทึกทับข้อมูลเดิม (กรณีบิลซ้ำ)</label>
  </div>

  <div id="cropArea"><img id="image" src=""></div>
  <button id="btnProcess" style="display:none;" onclick="processImage()">🚀 เริ่มสแกนและบันทึก</button>
  <div id="status"></div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxnCwbzrlgc6RDOVJE2dKIfO70AZye0F1TUCUPAGSxRH1WkfaVMHjACUjUl2HQfCN0/exec"; 
    
    window.onload = async () => {
      const res = await (await fetch(API_URL + "?action=getInitialSetup")).json();
      if(res.status === "success") {
        let html = '<b>💰 ราคาน้ำมันวันนี้</b><div class="price-grid">';
        res.data.groups.forEach(g => {
          html += `<div class="price-item"><label>${g}</label><input type="number" step="any" class="price-input" data-group="${g}" value="${res.data.lastPrices[g]||''}"></div>`;
        });
        document.getElementById('priceContainer').innerHTML = html + '</div>';
      }
    };

    let cropper;
    document.getElementById('fileInput').onchange = (e) => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        document.getElementById('image').src = ev.target.result;
        document.getElementById('cropArea').style.display = 'block';
        document.getElementById('btnProcess').style.display = 'block';
        document.getElementById('overwriteContainer').style.display = 'block';
        document.getElementById('status').innerText = "";
        
        if (cropper) cropper.destroy();
        
        cropper = new Cropper(document.getElementById('image'), { 
          viewMode: 1,
          autoCropArea: 1, // สูง 100%
          ready: function () {
            // 📌 หั่นพื้นที่ด้านซ้าย 15% และขวา 15% ออก (เหลือความกว้างตรงกลาง 70%)
            const containerData = cropper.getContainerData();
            cropper.setCropBoxData({
              left: containerData.width * 0.15,
              top: 0,
              width: containerData.width * 0.70,
              height: containerData.height
            });
          }
        });
      };
      reader.readAsDataURL(e.target.files[0]);
    };

    async function processImage() {
      const btn = document.getElementById('btnProcess');
      const status = document.getElementById('status');
      btn.disabled = true; status.innerText = "⏳ AI กำลังสแกนบิลและบันทึกข้อมูล..."; status.style.color = "blue";
      
      const prices = {};
      document.querySelectorAll('.price-input').forEach(i => prices[i.dataset.group] = parseFloat(i.value) || 0);

      const payload = { 
        action: "processBillData", 
        base64Image: cropper.getCroppedCanvas({ width: 1000 }).toDataURL('image/jpeg', 0.8).split(',')[1],
        forceOverwrite: document.getElementById('overwriteCheck').checked,
        prices: prices
      };

      try {
        const res = await (await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) })).json();
        status.innerText = res.message;
        status.style.color = (res.status === "success" ? "green" : "red");
      } catch (e) { 
        status.innerText = "❌ เชื่อมต่อขัดข้อง โปรดลองใหม่"; 
        status.style.color = "red";
      }
      btn.disabled = false;
    }
  </script>
</body>
</html>
