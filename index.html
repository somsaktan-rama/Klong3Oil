<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>อัปโหลดบิลส่งกะ คลอง 3 V1.03</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.css" rel="stylesheet">
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
    .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    img { max-width: 100%; }
    .img-container { margin-top: 15px; display: none; }
    button { width: 100%; padding: 12px; margin-top: 15px; background: #1a73e8; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold;}
    button:disabled { background: #ccc; cursor: not-allowed;}
    .nav-link { display: block; text-align: center; margin-top: 20px; color: #1a73e8; text-decoration: none; font-weight: bold; }
    .overwrite-box { margin-top: 15px; background: #fff3cd; padding: 12px; border-radius: 6px; border: 1px solid #ffeeba; display: none;}
    .overwrite-label { cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: bold; color: #856404; font-size: 14px;}
    
    /* สไตล์กล่องราคาน้ำมัน */
    .price-box { background: #e8f0fe; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #cce5ff; }
    .price-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 10px; }
    .price-item label { font-weight: bold; font-size: 14px; display: block; margin-bottom: 5px; color: #1a73e8;}
    .price-item input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; text-align: right; font-weight: bold; font-size: 1.1em;}
  </style>
</head>
<body>
  <div class="container">
    <h2 style="text-align: center;">📸 ถ่ายรูป/อัปโหลดบิลตัดยอด</h2>
    
    <div class="price-box" id="priceContainer">
      <div style="text-align:center; color: gray;">⏳ กำลังโหลดราคาน้ำมันกะล่าสุด...</div>
    </div>

    <input type="file" id="fileInput" accept="image/*" style="width: 100%; padding: 10px 0; margin-top: 10px;">
    <div class="img-container" id="cropArea"><img id="image" src=""></div>
    
    <div class="overwrite-box" id="overwriteContainer">
      <label class="overwrite-label">
        <input type="checkbox" id="overwriteCheck" style="width:18px; height:18px;"> 
        ⚠️ บันทึกทับแถวเดิมหากตรวจพบว่าวัน-เวลาซ้ำ
      </label>
    </div>

    <button id="btnProcess" style="display:none;" onclick="processImage()">✂️ ยืนยันการ Crop และส่งให้อ่านค่า</button>
    <div id="status" style="margin-top: 15px; text-align: center; font-weight: bold; font-size: 16px;"></div>
    
    <hr style="margin-top: 25px; border: 0; border-top: 1px solid #ddd;">
    <a href="verify.html" class="nav-link">👉 ไปที่หน้าจอตรวจสอบและแก้ไขบิล</a>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.js"></script>
  <script>
    // ⚠️ นำ Web App URL ของคุณมาใส่ตรงนี้
    const API_URL = "https://script.google.com/macros/s/AKfycbxnCwbzrlgc6RDOVJE2dKIfO70AZye0F1TUCUPAGSxRH1WkfaVMHjACUjUl2HQfCN0/exec"; 

    // ดึงราคาน้ำมันเริ่มต้นตอนเปิดเว็บ
    window.onload = async function() {
      try {
        const response = await fetch(API_URL + "?action=getInitialSetup");
        const result = await response.json();
        if(result.status === "success") {
          const container = document.getElementById('priceContainer');
          let html = '<h4 style="margin:0 0 10px 0; color:#1a73e8;">💰 ตั้งราคาขาย (ดึงจากกะล่าสุดอัตโนมัติ)</h4>';
          if(result.data.groups.length === 0) {
            html += '<div style="color:red; font-size:14px;">ไม่พบรายการน้ำมัน โปรดเช็ก Header H3 ใน Sheet</div>';
          } else {
            html += '<div class="price-grid">';
            result.data.groups.forEach(group => {
              let price = result.data.lastPrices[group] || 0;
              html += `<div class="price-item"><label>${group} (บ./ลิตร)</label><input type="number" step="any" class="price-input" data-group="${group}" value="${price}"></div>`;
            });
            html += '</div>';
          }
          container.innerHTML = html;
        }
      } catch(e) {
        document.getElementById('priceContainer').innerHTML = "<div style='color:red;'>ดึงราคาไม่สำเร็จ</div>";
      }
    };

    let cropper;
    const image = document.getElementById('image');
    
    document.getElementById('fileInput').addEventListener('change', function (e) {
      if (e.target.files && e.target.files.length > 0) {
        const reader = new FileReader();
        reader.onload = function (event) {
          image.src = event.target.result;
          document.getElementById('cropArea').style.display = 'block';
          document.getElementById('btnProcess').style.display = 'block';
          document.getElementById('overwriteContainer').style.display = 'block'; 
          if (cropper) cropper.destroy();
          cropper = new Cropper(image, { viewMode: 2, autoCropArea: 1 });
        };
        reader.readAsDataURL(e.target.files[0]);
      }
    });

    async function processImage() {
      if (!cropper) return;
      const btn = document.getElementById('btnProcess');
      const statusDiv = document.getElementById('status');
      btn.disabled = true;
      statusDiv.innerText = "⏳ กำลังส่งข้อมูลให้ระบบบันทึก...";
      statusDiv.style.color = "#d93025";
      
      const base64Image = cropper.getCroppedCanvas().toDataURL('image/jpeg').split(',')[1];
      const isOverwrite = document.getElementById('overwriteCheck').checked;

      // กวาดราคาน้ำมันจากทุกช่อง
      let currentPrices = {};
      document.querySelectorAll('.price-input').forEach(input => {
        currentPrices[input.dataset.group] = parseFloat(input.value) || 0;
      });

      const payload = { 
        action: "processBillData", 
        base64Image: base64Image,
        forceOverwrite: isOverwrite,
        prices: currentPrices // ส่งราคาไปด้วย
      };

      try {
        const response = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) });
        const result = await response.json();
        
        if (result.status === "success") {
          statusDiv.style.color = "#137333";
          statusDiv.innerText = result.message; 
          document.getElementById('overwriteCheck').checked = false; 
        } else {
          statusDiv.innerText = "❌ " + result.message; 
        }
      } catch (err) {
        statusDiv.innerText = "❌ เกิดข้อผิดพลาดในการเชื่อมต่อ";
      } finally { btn.disabled = false; }
    }
  </script>
</body>
</html>
