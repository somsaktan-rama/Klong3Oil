<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>อัปโหลดบิลส่งกะ คลอง 3 V1.111</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.css" rel="stylesheet">
  <style>
    body { font-family: sans-serif; padding: 15px; background: #f0f2f5; }
    .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .price-box { background: #e8f0fe; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #cce5ff; }
    .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .price-item input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; text-align: right; font-weight: bold; font-size: 1.1em; box-sizing: border-box;}
    button { width: 100%; padding: 12px; margin-top: 15px; background: #1a73e8; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold;}
    button:disabled { background: #ccc; }
    
    /* 💡 แก้ปัญหาช่อง Crop ยาวเกินไป โดยจำกัดความสูงไว้ที่ 60% ของหน้าจอ */
    .img-container { 
      margin-top: 15px; 
      display: none; 
      max-height: 60vh; /* ไม่ให้ยาวทะลุหน้าจอ */
      background-color: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 4px;
      overflow: hidden;
    }
    img { max-width: 100%; display: block; }
    
    .overwrite-box { margin-top: 15px; background: #fff3cd; padding: 12px; border-radius: 6px; border: 1px solid #ffeeba; display: none;}
    .shift-box { margin-top: 15px; background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
    select { width: 100%; padding: 10px; font-size: 16px; border-radius: 4px; border: 1px solid #aaa; }
  </style>
</head>
<body>
  <div class="container">
    <h2 style="text-align: center;">📸 อัปโหลดบิลส่งกะ คลอง 3 V1.111</h2>
    
    <div class="price-box" id="priceContainer">กำลังโหลดราคาล่าสุด...</div>

    <div class="shift-box">
      <label style="font-weight: bold; color: #1a73e8; display: block; margin-bottom: 5px;">🕒 ระบบกะการทำงาน:</label>
      <select id="shiftOverride">
        <option value="AUTO">🤖 อัตโนมัติ (เช้า/ดึก ตามเวลาสแกน)</option>
        <option value="เช้า">☀️ บังคับเป็น: กะเช้า</option>
        <option value="บ่าย">🌤️ บังคับเป็น: กะบ่าย</option>
        <option value="ดึก">🌙 บังคับเป็น: กะดึก</option>
      </select>
    </div>

    <input type="file" id="fileInput" accept="image/*" style="width: 100%; margin-top: 15px;">
    
    <div class="img-container" id="cropArea"><img id="image"></div>

    <div class="overwrite-box" id="overwriteContainer">
      <label style="cursor:pointer; color:#856404; font-weight:bold;"><input type="checkbox" id="overwriteCheck"> ⚠️ บันทึกทับข้อมูลเดิม (กรณีบิลซ้ำ)</label>
    </div>

    <button id="btnProcess" style="display:none;" onclick="processImage()">✂️ Crop และส่งอ่านค่า</button>
    <div id="status" style="margin-top: 15px; text-align: center; font-weight: bold;"></div>
    
    <hr style="margin-top: 20px; border: 0; border-top: 1px solid #ddd;">
    <a href="verify.html" style="display:block; text-align:center; color:#1a73e8; text-decoration:none; font-weight:bold;">👉 ไปหน้าจอตรวจสอบบิล</a>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.js"></script>
  <script>
    // ⚠️ อย่าลืมใส่ Web App URL ของคุณตรงนี้นะครับ
    const API_URL = "https://script.google.com/macros/s/AKfycbxnCwbzrlgc6RDOVJE2dKIfO70AZye0F1TUCUPAGSxRH1WkfaVMHjACUjUl2HQfCN0/exec"; 

    window.onload = async () => {
      try {
        const res = await (await fetch(API_URL + "?action=getInitialSetup")).json();
        if(res.status === "success") {
          let html = '<b>💰 ตั้งราคาขาย (บาท/ลิตร)</b><div class="price-grid">';
          res.data.groups.forEach(g => {
            html += `<div class="price-item"><label>${g}</label><input type="number" step="any" inputmode="decimal" class="price-input" data-group="${g}" value="${res.data.lastPrices[g]||''}"></div>`;
          });
          document.getElementById('priceContainer').innerHTML = html + '</div>';
        }
      } catch (e) {
        document.getElementById('priceContainer').innerHTML = "<div style='color:red; text-align:center;'>ดึงราคาไม่สำเร็จ</div>";
      }
    };

    let cropper;
    document.getElementById('fileInput').onchange = (e) => {
      if (!e.target.files.length) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        document.getElementById('image').src = ev.target.result;
        document.getElementById('cropArea').style.display = 'block';
        document.getElementById('btnProcess').style.display = 'block';
        document.getElementById('overwriteContainer').style.display = 'block';
        
        if (cropper) cropper.destroy();
        
        // 💡 ตั้งค่า Cropper ใหม่ ให้ตัดขอบซ้าย-ขวา 20% อัตโนมัติ
        cropper = new Cropper(document.getElementById('image'), { 
          viewMode: 2,
          dragMode: 'move', // ให้ลากเลื่อนรูปได้ง่ายๆ
          ready: function () {
            const containerData = this.cropper.getContainerData();
            
            // ตั้งค่ากล่อง Crop: หดซ้าย 10% ขวา 10% (รวม 20%) ความสูงเต็ม 100%
            this.cropper.setCropBoxData({
              left: containerData.width * 0.1,  
              width: containerData.width * 0.8, 
              top: 0,
              height: containerData.height
            });
          }
        });
      };
      reader.readAsDataURL(e.target.files[0]);
    };

    async function processImage() {
      if (!cropper) return;
      const btn = document.getElementById('btnProcess');
      const status = document.getElementById('status');
      btn.disabled = true; status.innerText = "⏳ ระบบกำลังอ่านบิลและบันทึก..."; status.style.color = "red";
      
      const prices = {};
      document.querySelectorAll('.price-input').forEach(i => prices[i.dataset.group] = parseFloat(i.value) || 0);

      const payload = { 
        action: "processBillData", 
        base64Image: cropper.getCroppedCanvas().toDataURL('image/jpeg').split(',')[1],
        forceOverwrite: document.getElementById('overwriteCheck').checked,
        prices: prices,
        shiftOverride: document.getElementById('shiftOverride').value
      };

      try {
        const res = await (await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) })).json();
        status.innerText = (res.status === "success" ? res.message : "❌ " + res.message);
        status.style.color = (res.status === "success" ? "green" : "red");
        if(res.status === "success") document.getElementById('overwriteCheck').checked = false;
      } catch (e) { status.innerText = "❌ เชื่อมต่อล้มเหลว"; }
      btn.disabled = false;
    }
  </script>
</body>
</html>
