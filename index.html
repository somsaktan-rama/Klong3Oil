<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>อัปโหลดบิล Klong3Oil</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.css" rel="stylesheet">
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
    .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    img { max-width: 100%; }
    .img-container { margin-top: 15px; display: none; }
    button { width: 100%; padding: 12px; margin-top: 15px; background: #1a73e8; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
    button:disabled { background: #ccc; }
    .nav-link { display: block; text-align: center; margin-top: 15px; color: #1a73e8; text-decoration: none; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <h2>📸 ถ่ายรูป/อัปโหลดบิลตัดยอด</h2>
    <input type="file" id="fileInput" accept="image/*">
    <div class="img-container" id="cropArea"><img id="image" src=""></div>
    <button id="btnProcess" style="display:none;" onclick="processImage()">✂️ Crop และส่งให้อ่านค่า</button>
    <div id="status" style="margin-top: 15px; text-align: center; font-weight: bold;"></div>
    <hr>
    <a href="verify.html" class="nav-link">👉 ไปที่หน้าระบบตรวจสอบบิล</a>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.js"></script>
  <script>
    // ⚠️ นำ Web App URL ของคุณมาใส่ตรงนี้
    const API_URL = "https://script.google.com/macros/s/AKfycbxnCwbzrlgc6RDOVJE2dKIfO70AZye0F1TUCUPAGSxRH1WkfaVMHjACUjUl2HQfCN0/exec"; 

    let cropper;
    const image = document.getElementById('image');
    
    document.getElementById('fileInput').addEventListener('change', function (e) {
      if (e.target.files && e.target.files.length > 0) {
        const reader = new FileReader();
        reader.onload = function (event) {
          image.src = event.target.result;
          document.getElementById('cropArea').style.display = 'block';
          document.getElementById('btnProcess').style.display = 'block';
          if (cropper) cropper.destroy();
          cropper = new Cropper(image, { viewMode: 2, autoCropArea: 1 });
        };
        reader.readAsDataURL(e.target.files[0]);
      }
    });

    async function processImage() {
      if (!cropper) return;
      const btn = document.getElementById('btnProcess');
      const statusDiv = document.getElementById('status');
      btn.disabled = true;
      statusDiv.innerText = "⏳ กำลังประมวลผล (อาจใช้เวลา 10-15 วินาที)...";
      statusDiv.style.color = "#d93025";
      
      const base64Image = cropper.getCroppedCanvas().toDataURL('image/jpeg').split(',')[1];
      const payload = { action: "processBillData", base64Image: base64Image };

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        
        if (result.status === "success") {
          statusDiv.style.color = "#137333";
          statusDiv.innerText = "✅ " + result.message;
        } else {
          statusDiv.innerText = "❌ Error: " + result.message;
        }
      } catch (err) {
        statusDiv.innerText = "❌ Network Error: ตรวจสอบการเชื่อมต่อ";
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
